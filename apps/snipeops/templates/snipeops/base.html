<!-- snipeops/base.html -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}SnipeOps{% endblock %}</title>

  <link rel="stylesheet" href="{{ url_for('snipeops.static', filename='css/snipeops.css') }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
      window.APP_CONFIG = {timezone: "{{ SYSTEM_TIMEZONE }}"};
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="{{ url_for('snipeops.index') }}">SnipeOps</a>

      <nav class="nav">
          <a href="{{ url_for('launchpad_ui.home') }}" class="nav-link">Dashboard</a>
          <a href="{{ url_for('snipeops.index') }}" class="nav-link">Overview</a>

          <div class="nav-dropdown">
              <button class="nav-dropdown-btn" type="button">
                  Tools
                  <span class="nav-caret">▾</span>
              </button>

              <div class="nav-dropdown-menu">
                  <a href="{{ url_for('import_by_scan.index') }}" class="nav-dropdown-item">Import by Scan</a>
                  <a href="{{ url_for('snipe_catalog.index') }}" class="nav-dropdown-item">Catalog</a>
              </div>
          </div>

          {% if session.get("is_authenticated") %}
          <div class="nav-dropdown">
              <button class="nav-dropdown-btn" type="button">
                  Account
                  <span class="nav-caret">▾</span>
              </button>

              <div class="nav-dropdown-menu nav-dropdown-menu-sm">
                  <a href="{{ url_for('auth.logout') }}" class="nav-dropdown-item">Logout</a>
              </div>
          </div>
          {% else %}
              <a href="{{ url_for('auth.login') }}" class="nav-link">Login</a>
          {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="muted">SnipeOps • Internal SnipeIT Helper</span>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
