<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ department_name }} Status Board</title>

  <link
    rel="stylesheet"
    href="{{ url_for('staff_status.static', filename='staff_status.css') }}"
  >
</head>
<body class="staff-status-board-body">
  <main class="staff-status-board-shell">
    <header class="staff-status-board-header">
      <h1>{{ department_name }} Status Board</h1>
      <p>Live staff location and availability</p>
    </header>

    <section id="staff-status-board-grid" class="staff-status-board-grid">
      {% for row in board_rows %}
        <article class="staff-status-board-row">
          <div class="staff-status-board-name">{{ row.display_name }}</div>
          <div class="staff-status-board-status {% if row.is_out_of_office %}out{% endif %}">
            {{ row.display_status_label }}
          </div>
          <div class="staff-status-board-updated">
            {{ row.updated_at or "No updates yet" }}
          </div>
        </article>
      {% endfor %}
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const grid = document.getElementById("staff-status-board-grid");
      const refreshSeconds = {{ refresh_seconds|default(15) }};
      const dataUrl = "{{ url_for('staff_status.board_public_data', token=board_token) }}";

      function renderRows(rows) {
        grid.innerHTML = "";

        rows.forEach((row) => {
          const article = document.createElement("article");
          article.className = "staff-status-board-row";

          article.innerHTML = `
            <div class="staff-status-board-name">${row.display_name}</div>
            <div class="staff-status-board-status ${row.is_out_of_office ? "out" : ""}">
              ${row.display_status_label}
            </div>
            <div class="staff-status-board-updated">
              ${row.updated_at || "No updates yet"}
            </div>
          `;

          grid.appendChild(article);
        });
      }

      async function refreshBoard() {
        try {
          const response = await fetch(dataUrl, { method: "GET" });
          const payload = await response.json();

          if (response.ok && payload.ok && Array.isArray(payload.rows)) {
            renderRows(payload.rows);
          }
        } catch (error) {
          // ignore transient refresh failures
        }
      }

      window.setInterval(refreshBoard, refreshSeconds * 1000);
    });
  </script>
</body>
</html>
